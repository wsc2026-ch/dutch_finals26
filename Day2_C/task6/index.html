<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>CSS Flex</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, sans-serif;
        background: #dddddd;
      }
      main {
        margin: 40px auto;
        width: 600px;
        background-color: white;
      }

      section {
        padding: 20px;
      }
      article.one {
        margin-bottom: 20px;
        display: flex;
        gap: 20px;
      }

      article.one div {
        padding: 20px;
        min-height: 100px;
        border-radius: 20px;
        color: #ffffff;
        text-align: center;
        align-content: center;
        width: 25%;
      }

      .red {
        background: red;
      }
      .blue {
        background: blue;
      }
      .yellow {
        background: yellow;
      }
      .green {
        background: green;
      }

      article.two {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      article.two div {
        padding: 5px 20px;
        border-radius: 10px;
        width: 100%;
      }

      .bar1 {
        background: #cccccc;
      }
      .bar2 {
        background: #aaaaaa;
      }
      .bar3 {
        background: #666666;
      }
      .bar4 {
        background: #222222;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <article class="one">
          <div class="red">Rood</div>
          <div class="blue">Blauw</div>
          <div class="yellow">Geel</div>
          <div class="green">Groen</div>
        </article>
        <article class="two">
          <div class="bar1">Balk 1</div>
          <div class="bar2">Balk 2</div>
          <div class="bar3">Balk 3</div>
          <div class="bar4">Balk 4</div>
        </article>
      </section>
    </main>
  </body>
</html>
