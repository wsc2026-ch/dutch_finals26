<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cluck & Catch</title>
</head>
<body>
  <main>
    <img class="logo" src="/mediafiles/images/logo_cluck_and_catch.png" alt="Cluck & Catch logo" />
    <div class="grass"></div>
    <img class="coop" src="/mediafiles/images/chicken_coop.png" alt="Chicken coop" />
    <a id="start" href="/game">START</a>
    <a id="scores" href="/scores">SCORES</a>
  </main>
  <style>
    @font-face {
      font-family: Freeman;
      src: url("/mediafiles/fonts/Freeman-Regular.ttf") format("truetype");
    }
    :root {
      --px: calc(0.001201923076923077 * 100vh);
    }
    body {
      margin: 0;
      background: linear-gradient(#5Eb5B9, #75CDCD);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Freeman, sans-serif;
      font-size: calc(16 * var(--px));
      height: 100vh;
    }
    main {
      background-image: url("/mediafiles/images/sun.png");
      background-position: center 37%;
      background-size: 150%;
      aspect-ratio: 3/2;
      max-width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .grass {
      height: calc(300 * var(--px));
      width: 100%;
      background-color: #6E8C39;
      border-top: calc(5 * var(--px)) solid #4C7424;
      position: absolute;
      bottom: 0;
      background-image: url("/mediafiles/images/grass.png");
      background-size: calc(598 * var(--px)) calc(126 * var(--px));
      background-position: center 20%;
      background-repeat: no-repeat;
    }
    .logo {
      width: calc(376 * var(--px));
      margin: 0 auto;
      display: block;
      margin-top: calc(60 * var(--px));
    }
    .coop {
      width: calc(331 * var(--px));
      margin-top: calc(40 * var(--px));
      z-index: 1;
    }
    #start {
      margin-top: calc(41 * var(--px));
      background-color: #F47E23;
      z-index: 1;
      color: white;
      text-decoration: none;
      font-size: calc(38 * var(--px));
      line-height: 1.081;
      border-radius: calc(10 * var(--px));
      padding: calc(13 * var(--px)) calc(32 * var(--px)) calc(15 * var(--px));
      box-shadow: inset 0px calc(-5 * var(--px)) 0px 0px #DE6313, inset 0px calc(5 * var(--px)) 0px 0px #FCB04C;
    }
    #scores {
      font-size: calc(28 * var(--px));
      margin-top: calc(28 * var(--px));
      color: white;
      z-index: 1;
      line-height: 1.081;
      text-decoration: none;
    }
  </style>
</body>
</html>
